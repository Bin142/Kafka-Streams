# Kafka Clusters Configuration
# This file contains connection details for Kafka clusters

clusters:
  # Development Cluster
  - id: dev-cluster
    name: Development Cluster
    bootstrapServers: localhost:9092
    properties:
      # security.protocol: PLAINTEXT
    schemaRegistry:
      url: http://localhost:8081
      # basicAuthUsername: 
      # basicAuthPassword:
    connect:
      - name: connect-dev
        url: http://localhost:8083
        # basicAuthUsername:
        # basicAuthPassword:

